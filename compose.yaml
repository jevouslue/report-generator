services:
  app:
    image: eclipse-temurin:17-jdk
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env

  db:
    image: gvenzl/oracle-free
    environment:
      ORACLE_PASSWORD: '${DB_PASSWORD}'
      APP_USER: '${DB_USER}'
      APP_USER_PASSWORD:  '${DB_PASSWORD}'
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
      start_interval: 5s
    ports:
      - "1521:1521"
    volumes:
      - 'report-generator-oracle:/opt/oracle/oradata'
volumes:
  report-generator-oracle:
    driver: local
